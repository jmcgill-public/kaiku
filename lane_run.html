<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KAAMOS — LANE RUN</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #070711; display: flex; flex-direction: column;
         align-items: center; justify-content: center; min-height: 100vh;
         font-family: 'Courier New', monospace; }
  canvas { image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const W = 880, H = 560;
const c = document.getElementById('c');
c.width = W; c.height = H;
const ctx = c.getContext('2d');

// KaamOS palette
const AMBER    = [200, 160, 80];
const VIOLET   = [128,  48, 192];
const DIM      = [60,   50,  30];
const VOID     = [7,     7,  17];

// Pre-seeded RNG (no flicker)
function rng(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

// Glyph bell curve: peaks at edge=16, sigma=4
function glyphDensity(e) {
  const mu = 16, sig = 4;
  return Math.exp(-0.5 * ((e - mu) / sig) ** 2);
}

// Build band data per lane (pre-computed, stable)
const LANES = 9;
const laneData = [];
for (let i = 0; i < LANES; i++) {
  const r = rng(i * 7919 + 3571);
  const bands = [];
  for (let e = 4; e <= 28; e++) {
    const d = glyphDensity(e);
    if (d < 0.04) continue;
    const jitter = (r() - 0.5) * 0.012;          // gel lane wobble
    const xNorm  = 1.0 - (e - 4) / 24.0 + jitter;
    const ghost  = r() > 0.62;                    // satellite band?
    const gOff   = ghost ? (r() - 0.5) * 0.025 : 0;
    bands.push({
      xNorm,
      intensity: d * (0.75 + 0.25 * r()),
      halfW: 1.5 + d * 3.5 + r() * 1.5,          // px half-width
      ghost, gOff,
      ghostI: d * 0.18 * r()
    });
  }
  // Pre-compute noise pixels (sparse)
  const noise = [];
  for (let k = 0; k < 60; k++) {
    noise.push({ x: r(), y: r() - 0.5, a: r() * 0.12 });
  }
  laneData.push({ bands, noise });
}

// Layout
const PAD_L  = 118;  // label column
const PAD_T  = 52;
const PAD_B  = 36;
const GEL_W  = W - PAD_L - 16;
const GEL_H  = H - PAD_T - PAD_B;
const LANE_H = GEL_H / LANES;

const STATION_LABELS = [
  '1  KAUNO',
  '2  TAIMI',
  '3  VARIS',
  '4  KIEHU',
  '5  AAVA',
  '6  REKO',
  '7  TURO',
  '8  KEIJO',
  '9  HILJAISUUS'
];

function rgba(rgb, a) {
  return `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${a.toFixed(3)})`;
}

// Lerp between two rgb triples
function lerpRGB(a, b, t) {
  return [
    a[0] + (b[0]-a[0])*t,
    a[1] + (b[1]-a[1])*t,
    a[2] + (b[2]-a[2])*t
  ];
}

function draw(t) {
  // — background —
  ctx.fillStyle = `rgb(${VOID[0]},${VOID[1]},${VOID[2]})`;
  ctx.fillRect(0, 0, W, H);

  // gel block — slight edge vignette
  const vgx = ctx.createLinearGradient(PAD_L, 0, PAD_L + GEL_W, 0);
  vgx.addColorStop(0,    'rgba(0,0,0,0.5)');
  vgx.addColorStop(0.06, 'rgba(0,0,0,0.0)');
  vgx.addColorStop(0.94, 'rgba(0,0,0,0.0)');
  vgx.addColorStop(1,    'rgba(0,0,0,0.5)');
  ctx.fillStyle = vgx;
  ctx.fillRect(PAD_L, PAD_T, GEL_W, GEL_H);

  // — header —
  ctx.fillStyle = rgba(AMBER, 0.85);
  ctx.font = '12px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('KAAMOS  //  LANE RUN  //  GLYPH DENSITY SCAN', PAD_L, 24);
  ctx.fillStyle = rgba(AMBER, 0.35);
  ctx.font = '9px Courier New';
  ctx.fillText('MW  →  edge count', PAD_L, 40);

  // edge count ruler
  ctx.strokeStyle = rgba(AMBER, 0.25);
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(PAD_L, PAD_T - 4);
  ctx.lineTo(PAD_L + GEL_W, PAD_T - 4);
  ctx.stroke();

  ctx.textAlign = 'center';
  ctx.fillStyle = rgba(AMBER, 0.4);
  ctx.font = '9px Courier New';
  for (let e = 4; e <= 28; e += 4) {
    const rx = PAD_L + (1.0 - (e-4)/24.0) * GEL_W;
    ctx.beginPath();
    ctx.moveTo(rx, PAD_T - 7); ctx.lineTo(rx, PAD_T - 1);
    ctx.strokeStyle = rgba(AMBER, 0.3);
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.fillText(e, rx, PAD_T - 9);
  }

  // — lanes —
  for (let i = 0; i < LANES; i++) {
    const laneTop = PAD_T + i * LANE_H;
    const laneMid = laneTop + LANE_H * 0.5;
    const { bands, noise } = laneData[i];

    const isVoid      = i === 8;
    const isAdjacent  = i === 7;
    const proximity   = isVoid ? 1.0 : isAdjacent ? 0.45 : 0.0;

    // lane separator
    ctx.strokeStyle = rgba(AMBER, 0.06);
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(PAD_L, laneTop);
    ctx.lineTo(PAD_L + GEL_W, laneTop);
    ctx.stroke();

    // lane background (Hiljaisuus pulse)
    if (isVoid) {
      const pulse = 0.04 + 0.025 * Math.sin(t * Math.PI * 2 * 0.15);
      ctx.fillStyle = rgba(VIOLET, pulse);
      ctx.fillRect(PAD_L, laneTop, GEL_W, LANE_H);
    }

    // — label —
    ctx.textAlign = 'right';
    if (isVoid) {
      const lp = 0.55 + 0.45 * Math.sin(t * Math.PI * 2 * 0.15);
      ctx.fillStyle = rgba(VIOLET, lp);
      ctx.font = 'bold 10px Courier New';
    } else if (isAdjacent) {
      ctx.fillStyle = rgba(lerpRGB(AMBER, VIOLET, 0.35), 0.65);
      ctx.font = '10px Courier New';
    } else {
      ctx.fillStyle = rgba(AMBER, 0.55);
      ctx.font = '10px Courier New';
    }
    ctx.fillText(STATION_LABELS[i], PAD_L - 8, laneMid + 4);

    // — bands —
    for (const b of bands) {
      const bx = PAD_L + b.xNorm * GEL_W;
      const col = isVoid ? VIOLET : lerpRGB(AMBER, VIOLET, proximity * 0.6);

      if (isVoid) {
        // smear: vertical blur driven by time + band position
        const smearPhase = t * 0.07 + b.xNorm * 4.1;
        const smearH = LANE_H * (0.55 + 0.35 * Math.abs(Math.sin(smearPhase * Math.PI * 2)));
        const alpha   = b.intensity * (0.3 + 0.15 * Math.sin(smearPhase * Math.PI * 2 * 1.3));
        const sg = ctx.createLinearGradient(0, laneMid - smearH, 0, laneMid + smearH);
        sg.addColorStop(0.0, rgba(col, 0));
        sg.addColorStop(0.25, rgba(col, alpha * 0.5));
        sg.addColorStop(0.5,  rgba(col, alpha));
        sg.addColorStop(0.75, rgba(col, alpha * 0.5));
        sg.addColorStop(1.0, rgba(col, 0));
        ctx.fillStyle = sg;
        ctx.fillRect(bx - b.halfW * 2.5, laneMid - smearH, b.halfW * 5, smearH * 2);

      } else {
        // normal band — Gaussian vertical profile
        const bandH = LANE_H * 0.28;
        const smear = isAdjacent ? LANE_H * 0.06 * (1 + Math.sin(t*0.4)*0.3) : 0;
        const totalH = bandH + smear;
        const alpha = b.intensity * (0.7 - proximity * 0.15);

        // ghost band
        if (b.ghost) {
          const gx = PAD_L + (b.xNorm + b.gOff) * GEL_W;
          const gg = ctx.createLinearGradient(0, laneMid - totalH*0.6, 0, laneMid + totalH*0.6);
          gg.addColorStop(0, rgba(col, 0));
          gg.addColorStop(0.5, rgba(col, b.ghostI));
          gg.addColorStop(1, rgba(col, 0));
          ctx.fillStyle = gg;
          ctx.fillRect(gx - b.halfW * 0.8, laneMid - totalH*0.6, b.halfW*1.6, totalH*1.2);
        }

        // main band
        const bg = ctx.createLinearGradient(0, laneMid - totalH, 0, laneMid + totalH);
        bg.addColorStop(0,   rgba(col, 0));
        bg.addColorStop(0.25, rgba(col, alpha * 0.6));
        bg.addColorStop(0.5,  rgba(col, alpha));
        bg.addColorStop(0.75, rgba(col, alpha * 0.6));
        bg.addColorStop(1,   rgba(col, 0));
        ctx.fillStyle = bg;
        ctx.fillRect(bx - b.halfW, laneMid - totalH, b.halfW * 2, totalH * 2);
      }
    }

    // noise artifacts
    for (const n of noise) {
      const nx = PAD_L + n.x * GEL_W;
      const ny = laneMid + n.y * LANE_H;
      const col = isVoid ? VIOLET : AMBER;
      ctx.fillStyle = rgba(col, n.a * (0.3 + proximity * 0.4));
      ctx.fillRect(nx, ny, 1, 1);
    }
  }

  // vertical lane dividers (very faint)
  for (let e = 4; e <= 28; e += 4) {
    const lx = PAD_L + (1.0 - (e-4)/24.0) * GEL_W;
    ctx.strokeStyle = rgba(AMBER, 0.04);
    ctx.lineWidth = 0.5;
    ctx.setLineDash([2, 6]);
    ctx.beginPath();
    ctx.moveTo(lx, PAD_T);
    ctx.lineTo(lx, PAD_T + GEL_H);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // bottom border
  ctx.strokeStyle = rgba(AMBER, 0.15);
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(PAD_L, PAD_T + GEL_H);
  ctx.lineTo(PAD_L + GEL_W, PAD_T + GEL_H);
  ctx.stroke();

  // — status line —
  const hPulse = 0.35 + 0.35 * Math.sin(t * Math.PI * 2 * 0.15);
  ctx.textAlign = 'right';
  ctx.font = '10px Courier New';
  ctx.fillStyle = rgba(VIOLET, hPulse);
  ctx.fillText('● HILJAISUUS', W - 10, H - 8);

  ctx.textAlign = 'left';
  ctx.fillStyle = rgba(AMBER, 0.3);
  ctx.fillText(`67,753 distinct  //  109,600 sequences  //  peak: 16`, PAD_L, H - 8);
}

let frame = 0;
(function loop() {
  draw(frame / 60);
  frame++;
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
