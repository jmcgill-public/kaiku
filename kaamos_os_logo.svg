<svg viewBox="0 0 220 240" xmlns="http://www.w3.org/2000/svg" width="220" height="240">
<title>KaamOS — brand mark</title>
<desc>Flat-top hexagonal badge with notched ninth vertex in violet, K-rune (Younger Futhark Kaun register) inscribed in amber. KaamOS wordmark below.</desc>

<rect width="220" height="240" fill="#070711"/>

<polygon points="188,105 149,172.58 71,172.58 32,105 71,37.42 139,37.42 154,46.08 188,105"
         fill="#070711" stroke="#c8a050" stroke-width="2" stroke-linejoin="miter"/>

<polygon points="149,37.42 139,37.42 154,46.08"
         fill="#8030c0" opacity="0.85"/>

<polygon points="149,37.42 139,37.42 154,46.08"
         fill="none" stroke="#8030c0" stroke-width="1.2"/>

<polygon points="180,105 148.5,162.06 81.5,162.06 50,105 81.5,47.94 148.5,47.94"
         fill="none" stroke="#c8a050" stroke-width="0.6" opacity="0.12"/>

<line x1="110" y1="57" x2="110" y2="155"
      stroke="#c8a050" stroke-width="8.5" stroke-linecap="square"/>
<line x1="110" y1="106" x2="140" y2="54"
      stroke="#c8a050" stroke-width="8.5" stroke-linecap="square"/>
<line x1="110" y1="106" x2="140" y2="158"
      stroke="#c8a050" stroke-width="8.5" stroke-linecap="square"/>

<circle cx="149" cy="37.42" r="3.5" fill="#8030c0" opacity="0.9"/>

<text x="110" y="205"
      font-family="'Courier New', Courier, monospace"
      font-size="18"
      font-weight="bold"
      fill="#c8a050"
      text-anchor="middle"
      letter-spacing="4">KaamOS</text>

<line x1="48" y1="215" x2="172" y2="215" stroke="#c8a050" stroke-width="0.6" opacity="0.35"/>

</svg>
